services:
  mysql:
    image: mysql:8.2.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: frbatch
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./fr-batch-service
      dockerfile: Dockerfile
      # The Dockerfile pulls the private batch-job-api from GitHub Packages, so the
      # build needs a token. Export GITHUB_TOKEN (a PAT with read:packages) before
      # `docker compose up`; GITHUB_ACTOR defaults to x-access-token if unset.
      args:
        GITHUB_ACTOR: ${GITHUB_ACTOR:-x-access-token}
      secrets:
        - gh_token
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: frbatch
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - plugin-jars:/data/plugins/jars
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      # Not /actuator/health: it is 503 until a plugin is loaded (endless restart
      # loop on a fresh stack). /jobs/plugins is 200 once the app serves.
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/batch-service/jobs/plugins"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - app

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - prometheus

volumes:
  mysql-data:
  plugin-jars:
  prometheus-data:
  grafana-data:

secrets:
  # Sourced from the GITHUB_TOKEN env var at build time (BuildKit secret).
  gh_token:
    environment: GITHUB_TOKEN
