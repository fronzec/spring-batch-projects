# ============================================================
# Local Development Profile — MySQL via Podman/Docker
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=local
# ============================================================

# MySQL connection — override full URL to avoid placeholder resolution issues
spring.datasource.url=jdbc:mysql://localhost:3306/fr_batch_local?useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Spring Batch: auto-create BATCH_* tables in MySQL
spring.batch.jdbc.initialize-schema=always

# Override secondary datasource (avoids ${DB_NAME} placeholder from main config)
datasources.main.jdbcUrl=jdbc:mysql://localhost:3306/fr_batch_local?useLegacyDatetimeCode=false&serverTimezone=UTC
datasources.main.username=root
datasources.main.password=

# Flyway: handled by FlywayMigrationRunner (local profile) — see config/FlywayMigrationRunner.java
spring.flyway.enabled=false
logging.level.org.flywaydb=DEBUG

# Plugin auto-approve (skip approval workflow in dev)
app.plugins.approval.auto-approve=true

# Plugin signature: permissive (warn but allow unsigned JARs)
app.plugins.signature.mode=permissive

# Security: handled by SecurityConfig with {noop} dev passwords (admin/admin123, viewer/viewer123)
# Security auto-config exclusion removed — custom SecurityConfig handles everything

# Override passwords without {noop} prefix — NoOpPasswordEncoder uses raw strings
app.security.admin-password=admin123
app.security.viewer-password=viewer123

# Disable strict health group validation (Spring Boot 4.0 default)
management.endpoint.health.validate-group-membership=false

# Reduce chunk sizes for local dev
fr-batch-service.jobs.job1.step1.chunk-size=5
fr-batch-service.jobs.job1.step2.chunk-size=5
fr-batch-service.jobs.job1.step2.reader.chunk-size=5
fr-batch-service.jobs.job1.step3.chunk-size=5
fr-batch-service.jobs.job1.step3.reader.chunk-size=5
fr-batch-service.jobs.job2.chunk-size=5
fr-batch-service.jobs.job2.retry.max-attempts=2
fr-batch-service.jobs.job2.retry.backoff-millis=500

# Mock REST client
fr-batch-service.rest_clients.client1.base_url=http://localhost:9999
fr-batch-service.rest_clients.client1.connection_timeout_millis=500
fr-batch-service.rest_clients.client1.response_timeout_millis=500

# Plugin storage (absolute path — relative resolves against Jetty temp dir)
fr-batch-service.plugins.jar-dir=/Users/lalo/__home/projects/spring-batch-projects/target/local-plugins/jars/

# Enable audit listener logging
logging.level.com.fronzec.frbatchservice.batchjobs.plugins.listener=INFO
