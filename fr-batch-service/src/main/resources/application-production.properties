#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# PRODUCTION PROFILE — overrides application.properties
# Activated via: spring.profiles.active=production
#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Spring Web Configuration
#---------------------
server.servlet.context-path=/api/batch-service
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.group.plugins.include=pluginHealthIndicator
# Validate that health group members exist (catches misconfiguration)
management.endpoint.health.validate-group-membership=true

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Jackson Object Mapper Configuration
#---------------------
spring.jackson.property-naming-strategy=SNAKE_CASE

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Logging Configuration
#---------------------
# Production log level — info or warn; never debug
logging.level.fronzec=info

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Spring Batch Configuration
#---------------------
spring.batch.job.enabled=false
# In production, schema is managed by Flyway only — never auto-initialize
spring.batch.jdbc.initialize-schema=never

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Flyway Configuration
#---------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Spring Data Configuration
#---------------------
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.jpa.hibernate.ddl_auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# HikariCP Connection Pool (production sizing)
#---------------------
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Hibernate Statistics — disabled in production
#---------------------
spring.jpa.properties.hibernate.generate_statistics=false

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Multipart File Upload Configuration
#---------------------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=51MB

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Plugin JAR Storage Configuration
#---------------------
# Mount Docker volume at /data/plugins/jars for persistence
fr-batch-service.plugins.jar-dir=/data/plugins/jars

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Plugin Signature Verification Configuration
#---------------------
# Production mode: strict — unsigned/invalid JARs are REJECTED at upload time
app.plugins.signature.mode=strict

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Plugin Approval Configuration
#---------------------
# Production mode: manual approval required before plugins can be loaded
app.plugins.approval.auto-approve=false

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Custom Configurations (production overrides)
#---------------------
fr-batch-service.jobs.job1.step1.chunk-size=10
fr-batch-service.jobs.job1.step2.chunk-size=500
fr-batch-service.jobs.job1.step2.reader.chunk-size=1000
fr-batch-service.jobs.job1.step3.chunk-size=32
fr-batch-service.jobs.job1.step3.reader.chunk-size=512
fr-batch-service.jobs.job2.chunk-size=10
fr-batch-service.jobs.job2.retry.max-attempts=3
fr-batch-service.jobs.job2.retry.backoff-millis=2000

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Security Configuration (BCrypt, production-grade)
# Credentials are REQUIRED via env vars — no defaults are committed. Provide
# {bcrypt}-prefixed hashes; the production DelegatingPasswordEncoder reads the
# prefix. The app fails to start if these are unset (fail-closed).
#---------------------
app.security.admin-user=${APP_SECURITY_ADMIN_USER:admin}
app.security.admin-password=${APP_SECURITY_ADMIN_PASSWORD}
app.security.viewer-user=${APP_SECURITY_VIEWER_USER:viewer}
app.security.viewer-password=${APP_SECURITY_VIEWER_PASSWORD}

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Rest clients configs
#---------------------
fr-batch-service.rest_clients.client1.connection_timeout_millis=500
fr-batch-service.rest_clients.client1.response_timeout_millis=500
fr-batch-service.rest_clients.client1.base_url=http://localhost:8081
fr-batch-service.rest_clients.client1.dispatch_path.post=/mock-service/receive-batch
fr-batch-service.rest_clients.client1.calculate.get=/mock-service/calculate-random-number

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# TLS Configuration (HTTPS)
# Uncomment and configure for production HTTPS. Alternatively, use a reverse
# proxy (nginx/Traefik) to terminate TLS before the app.
#---------------------
