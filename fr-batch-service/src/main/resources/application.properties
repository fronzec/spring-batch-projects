#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Spring Web Configuration
#---------------------
server.servlet.context-path=/api/batch-service
# Do NOT expose `env` here: it dumps resolved properties (incl. credentials) and
# this base value is inherited by any profile that does not override it.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.group.plugins.include=pluginHealthIndicator
#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Jackson Object Mapper Configuration
#---------------------
spring.jackson.property-naming-strategy=SNAKE_CASE
#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Logging Configuration
#---------------------
logging.level.fronzec=debug
#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Spring Batch Configuration
#---------------------
# Disable auto jobs starting
spring.batch.job.enabled=false
spring.batch.jdbc.initialize_schema=always
#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Flyway Configuration
#---------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Spring Data Configuration
#---------------------
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.jpa.hibernate.ddl_auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Custom DataSources Configuration note: for local environment we use the minimum setup required by Hikari
#---------------------
datasources.main.jdbcUrl=jdbc:mysql://localhost:3306/${DB_NAME}?useLegacyDatetimeCode=false&serverTimezone=UTC
datasources.main.username=root
datasources.main.password=
datasources.main.driverClassName=com.mysql.cj.jdbc.Driver
datasources.main.poolName=mainDataSourcePool
datasources.main.minimumIdle=1
datasources.main.maximumPoolSize=20
datasources.main.connectionTimeoutMillis=60000
datasources.main.hibernate.hbm2ddl.auto=none

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Hibernate - Spring Data: Statistics and Debugging through Logging WARN!!! try to don't use in production environments
#---------------------
# A- Via Loggers for hibernate and JdbcTemplate queries
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
#logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
#logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE

# B- To Standard Output, consider use: Via loggers and JdbcTemplate queries or p6spy instead
#spring.jpa.properties.hibernate.show_sql=true
#spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.use_sql_comments=true

# C- p6sy https://p6spy.readthedocs.io/en/latest/index.html#
# Register P6LogFactory to log JDBC events
decorator.datasource.datasource-proxy.query.enable-logging=true
decorator.datasource.p6spy.multiline=true

# To enable hibernate statistics
spring.jpa.properties.hibernate.generate_statistics=true

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Multipart File Upload Configuration
#---------------------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=51MB
#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Plugin JAR Storage Configuration
#---------------------
fr-batch-service.plugins.jar-dir=./plugins/jars/
#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Plugin Signature Verification Configuration
#---------------------
# Mode: permissive (default) — unsigned/invalid JARs log warnings but upload proceeds.
#       strict              — unsigned/invalid JARs are rejected at upload time.
app.plugins.signature.mode=permissive
#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Plugin Approval Configuration
#---------------------
app.plugins.approval.auto-approve=true
#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Custom Configurations
#---------------------
fr-batch-service.jobs.job1.step1.chunk-size=10
fr-batch-service.jobs.job1.step2.chunk-size=500
fr-batch-service.jobs.job1.step2.reader.chunk-size=1000
fr-batch-service.jobs.job1.step3.chunk-size=32
fr-batch-service.jobs.job1.step3.reader.chunk-size=512
fr-batch-service.jobs.job2.chunk-size=10
fr-batch-service.jobs.job2.retry.max-attempts=3
fr-batch-service.jobs.job2.retry.backoff-millis=2000
#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Security Configuration (HTTP Basic)
# Passwords have NO defaults here — each active profile MUST supply them:
#   local:      application-local.properties     (admin123 / viewer123, noop)
#   docker:     application-docker.properties    (admin123 / viewer123, noop)
#   production: application-production.properties (bcrypt hashes via env vars)
# Usernames default to admin/viewer as a convenience; passwords are intentionally
# absent so the app fails to start rather than running with leaked plain-text defaults.
#---------------------
app.security.admin-user=admin
app.security.viewer-user=viewer
#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
# Rest clients configs
#---------------------
fr-batch-service.rest_clients.client1.connection_timeout_millis=500
fr-batch-service.rest_clients.client1.response_timeout_millis=500
fr-batch-service.rest_clients.client1.base_url=http://localhost:8081
fr-batch-service.rest_clients.client1.dispatch_path.post=/mock-service/receive-batch
fr-batch-service.rest_clients.client1.calculate.get=/mock-service/calculate-random-number
