# ============================================================
# Docker Compose Profile — LOCAL full-stack testing only.
#
# NOT a production profile. Use 'production' for any internet-facing
# deployment. Spring Security stays ENABLED here: endpoints are protected
# by the dev credentials from application.properties (admin/viewer, {noop}).
# Auto-approve and permissive signature below are local conveniences and are
# safe only because access requires authentication.
# ============================================================

# MySQL (from docker-compose service 'mysql')
spring.datasource.url=jdbc:mysql://mysql:3306/frbatch?useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# Plugin storage (Docker volume)
fr-batch-service.plugins.jar-dir=/data/plugins/jars

# Flyway (handled by migrations in Docker)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator for Prometheus
management.endpoints.web.exposure.include=health,info,prometheus

# Disable health group validation for local
management.endpoint.health.validate-group-membership=false

# Auto-approve for local testing
app.plugins.approval.auto-approve=true
app.plugins.signature.mode=permissive

# Override secondary datasource
datasources.main.jdbcUrl=jdbc:mysql://mysql:3306/frbatch?useLegacyDatetimeCode=false&serverTimezone=UTC
datasources.main.username=root
datasources.main.password=${DB_PASSWORD}

# Batch init
spring.batch.jdbc.initialize-schema=always
