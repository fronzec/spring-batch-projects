# Spring Batch: disable auto-run of jobs at startup
spring.batch.job.enabled=false

# Jackson: match production snake_case naming strategy
spring.jackson.property-naming-strategy=SNAKE_CASE

# H2 in-memory database for tests (used by Spring Batch auto-schema init)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none

# Spring Batch schema initialization
spring.batch.jdbc.initialize-schema=always

# Override the development datasource (datasources.main.*) to point to H2
# This satisfies JpaConfig.mainDatasourceDevelopment() @ConfigurationProperties binding
datasources.main.jdbcUrl=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
datasources.main.driverClassName=org.h2.Driver
datasources.main.username=sa
datasources.main.password=
datasources.main.poolName=testPool
datasources.main.minimumIdle=1
datasources.main.maximumPoolSize=5
datasources.main.connectionTimeoutMillis=5000

# Use H2 dialect for Hibernate in tests (overrides production MySQL dialect)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Suppress irrelevant config warnings in test
fr-batch-service.jobs.job1.step1.chunk-size=10
fr-batch-service.jobs.job1.step2.chunk-size=10
fr-batch-service.jobs.job1.step2.reader.chunk-size=10
fr-batch-service.jobs.job1.step3.chunk-size=10
fr-batch-service.jobs.job1.step3.reader.chunk-size=10
fr-batch-service.rest_clients.client1.connection_timeout_millis=500
fr-batch-service.rest_clients.client1.response_timeout_millis=500
fr-batch-service.rest_clients.client1.base_url=http://localhost:9999
fr-batch-service.rest_clients.client1.dispatch_path.post=/mock-service/receive-batch
fr-batch-service.rest_clients.client1.calculate.get=/mock-service/calculate-random-number
fr-batch-service.jobs.job2.chunk-size=10
fr-batch-service.jobs.job2.retry.max-attempts=3
fr-batch-service.jobs.job2.retry.backoff-millis=100
